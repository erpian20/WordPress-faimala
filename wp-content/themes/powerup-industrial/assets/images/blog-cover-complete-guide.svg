<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Cordless Outdoor Tool Guide Cover</title>
  <desc id="desc">Illustrated cover for complete guide to lithium-ion cordless outdoor power tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1b2b" />
      <stop offset="100%" stop-color="#1f4d5f" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fdba74" />
    </linearGradient>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)" />
  <circle cx="1030" cy="-60" r="300" fill="#ffffff" opacity="0.08" />
  <circle cx="210" cy="840" r="280" fill="#ffffff" opacity="0.07" />

  <rect x="120" y="120" width="960" height="660" rx="34" fill="#0f2b3a" stroke="#ffffff" stroke-opacity="0.18" />
  <rect x="120" y="120" width="960" height="16" rx="8" fill="url(#accent)" />

  <text x="170" y="240" fill="#fdba74" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700" letter-spacing="2">POWERUP GUIDE</text>
  <text x="170" y="320" fill="#ffffff" font-size="64" font-family="Arial, Helvetica, sans-serif" font-weight="800">LITHIUM-ION</text>
  <text x="170" y="390" fill="#ffffff" font-size="58" font-family="Arial, Helvetica, sans-serif" font-weight="700">CORDLESS TOOLS</text>
  <text x="170" y="452" fill="#cde5ef" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="500">Chainsaw • Hedge Trimmer • Blower • Mower</text>

  <g transform="translate(170 520)">
    <rect width="370" height="74" rx="12" fill="#122f40" stroke="#ffffff" stroke-opacity="0.25" />
    <text x="28" y="48" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Practical Buying Tips</text>
  </g>

  <g transform="translate(560 520)">
    <rect width="370" height="74" rx="12" fill="#122f40" stroke="#ffffff" stroke-opacity="0.25" />
    <text x="28" y="48" fill="#ffffff" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Runtime &amp; Maintenance</text>
  </g>

  <g transform="translate(930 210)">
    <rect x="0" y="0" width="110" height="18" rx="9" fill="#fdba74" />
    <rect x="0" y="38" width="80" height="18" rx="9" fill="#fdba74" opacity="0.9" />
    <rect x="0" y="76" width="56" height="18" rx="9" fill="#fdba74" opacity="0.8" />
  </g>

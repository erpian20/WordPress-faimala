fastcgi_cache_path /tmp/nginx-fastcgi-cache levels=1:2 keys_zone=WORDPRESS:100m inactive=60m max_size=1g use_temp_path=off;

map $request_method $skip_cache_method {
    default 1;
    GET 0;
    HEAD 0;
}

map $query_string $skip_cache_query {
    default 0;
    ~*(^|&)(add-to-cart|wc-ajax|preview|preview_id|preview_nonce|customize_changeset_uuid|s|orderby|filter_|min_price|max_price|rating_filter|nonce|_wpnonce|doing_wp_cron)= 1;
}

map $request_uri $skip_cache_uri {
    default 0;
    ~^/wp-admin/ 1;
    ~^/wp-login\.php 1;
    ~^/wp-json/ 1;
    ~^/cart/? 1;
    ~^/checkout/? 1;
    ~^/my-account/? 1;
    ~^/wc-api/ 1;
}

map $http_cookie $skip_cache_cookie {
    default 0;
    ~*(wordpress_logged_in_|wordpress_sec_|comment_author_|wp-postpass_|woocommerce_items_in_cart|woocommerce_cart_hash|PHPSESSID) 1;
}

map "$skip_cache_method$skip_cache_query$skip_cache_uri$skip_cache_cookie" $skip_fastcgi_cache {
    default 1;
    "0000" 0;
}

map "$request_uri:$request_method" $wp_login_limit_key {
    default "";
    "/wp-login.php:POST" $binary_remote_addr;
}

limit_req_zone $wp_login_limit_key zone=wp_login:10m rate=10r/m;
limit_req_status 429;
limit_req_log_level warn;

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /var/www/powerup;
    index index.php index.html;

    client_max_body_size 64m;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location = /wp-config.php { deny all; return 404; }
    location = /xmlrpc.php { deny all; return 404; }
    location ~* ^/(?:readme|license)\.(?:html|txt)$ { deny all; return 404; }
    location ~ /\. { deny all; return 404; }
    location = /robots.txt { allow all; access_log off; log_not_found off; expires 1h; add_header Cache-Control "public, max-age=3600"; }
    location ~* ^/wp-sitemap.*\.xml$ { allow all; access_log off; log_not_found off; expires 1h; add_header Cache-Control "public, max-age=3600"; }

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|webp|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        limit_req zone=wp_login burst=20 nodelay;

        fastcgi_cache            WORDPRESS;
        fastcgi_cache_key        "$scheme$request_method$host$request_uri";
        fastcgi_cache_valid      200 301 302 10m;
        fastcgi_cache_valid      404 1m;
        fastcgi_cache_lock       on;
        fastcgi_cache_use_stale  error timeout invalid_header updating http_500 http_503;
        fastcgi_cache_bypass     $skip_fastcgi_cache;
        fastcgi_no_cache         $skip_fastcgi_cache;
        add_header X-FastCGI-Cache $upstream_cache_status always;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    root /var/www/powerup;
    index index.php index.html;

    ssl_certificate /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    client_max_body_size 64m;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
